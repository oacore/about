      robotsDisallow:
        label: Robots.txt - Disallow directives
        success:
          title: No disallow directives found.
          details: Robots.txt file does not contain disallow directives specifically blocking CORE.
          info: |
            We test whether the robots.txt file contains any Disallow directives that block the core agent (or a wildcard * that inadvertently includes it), to ensure it is explicitly permitted to crawl the site. For details check [Access for machine agents](/documentation/data-providers-guide#machine-agents) section in the CORE Data Providers guide.
        error:
          title: Disallow directives found.
          details: |
            Robots.txt file contain disallow directives specifically blocking CORE.
          info: |
            Edit the robots.txt file to remove any Disallow directives targeting the core agent (or a wildcard * that inadvertently includes it), ensuring it is explicitly permitted to crawl the site. For details check [Access for machine agents](/documentation/data-providers-guide#machine-agents) section in the CORE Data Providers guide.

      robotsCrawlDelay:
        label: Robots.txt - Crawl Delays
        success:
          title: No crawl-delay found.
          details: No crawl-delay found.
          info: |
            We test that no Crawl-delay directive is specified for the core agent. Delays of even 10 seconds can make it impossible for indexing services to harvest repositories with tens of thousands of records within a reasonable timeframe. For details check [Access for machine agents](/documentation/data-providers-guide#machine-agents) section in the CORE Data Providers guide.
        error:
          title: Crawl delay specified for CORE.
          details: |
            Crawl-delay: 10 seconds found in robots.txt
          info: |
            Remove the Crawl-delay directive for the core agent. Delays of even 10 seconds can make it impossible for indexing services to harvest repositories with tens of thousands of records within a reasonable timeframe. For details check [Access for machine agents](/documentation/data-providers-guide#machine-agents) section in the CORE Data Providers guide.

      robotsEssentialParts:
        label: Robots.txt - Essential Parts
        success:
          title: PDFs not restricted in robots.txt
          details: PDFs not restricted in robots.txt
          info: |
            We test that the robots.txt rules explicitly allow the core agent to crawl all essential directories, ensuring both landing pages and the paths where full-text files are hosted are accessible. For details check [Access for machine agents](/documentation/data-providers-guide#machine-agents) section in the CORE Data Providers guide.
        error:
          title: PDFs restricted in robots.txt
          details: PDFs restricted in robots.txt
          recommendation: |
            Modify the robots.txt rules to explicitly allow the core agent to crawl all essential directories, ensuring both landing pages and the paths where full-text files are hosted are accessible. For details check [Access for machine agents](/documentation/data-providers-guide#machine-agents) section in the CORE Data Providers guide.

