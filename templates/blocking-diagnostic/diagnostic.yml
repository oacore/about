meta:
  title:  Repository Indexability Diagnostics
  description: This tool will run basic diagnostic tests against your repository to find out if it is not blocking indexing systems.
  keywords: CORE, OAI-PMH, repository, open access, indexing, diagnostic, crawler

section:
  caption: blocking-diagnostic

header:
  overline: Diagnostic
  title: Repository Indexability Diagnostics
  description: |
    This tool will run basic diagnostic tests against your repository to find out if it is not blocking indexing systems.

    Enter your repository OAI-PMH base URL.

form:
  id: blocking-diagnostic-form
  repositoryUrl:
    label: Repository URL
    placeholder: https://oro.open.ac.uk/cgi/oai2
    inputId: blocking-diagnostic-repository-url
  submitLabel: Run Diagnostic
  submittingLabel: Checking…

errors:
  requiredUrl: Enter a repository OAI-PMH base URL.
  generic: Something went wrong. Please try again.

# Copy options from design (Frame 1196-4 success, 1196-5/6 error summaries, 1196-7 full matrix).
results:
  overall:
    success:
      title: All diagnostic tests passed successfully.
      summary: Congratulations, your repository passed all diagnostic tests which suggests that it can be indexed by CORE. However, note that the tests are not fully comprehensive and there may be, in some situations additional barriers to indexing. We recommend that you monitor the indexing in the [CORE Dashboard](/services/repository-dashboard) > Indexing tab, which provides a more comprehensive log from indexing attempts.
    warning:
      title: Repository isn’t accessible to CORE
      summary: Your repository cannot be successfully indexed by CORE. Some warnings may require attention.
    error:
      title: Repository isn't accessible to CORE
      summary: Your repository cannot be successfully indexed by CORE. Some warnings may require attention.
  helpLabels:
    whatIsChecks: What is tested
    recommendation: Recommendation

checks:
    title: Diagnostic Tests
    item:
      oaiPmh:
        label: OAI-PMH Interface
        success:
          title: OAI-PMH interface is accessible.
          details: Successfully verified Identify and ListRecords verbs
          info: |
            We test whether the OAI-PMH interface is actually enabled in the underlying repository software and if it is reachable via a standard web browser. We also check whether IP-based controls, rate limiting, or Web Application Firewalls (WAF) are blocking machine access, and verify that CORE's user agent or IPs are explicitly allowlisted. For details check the Ensuring your repository is visible via [OAI-PMH section](/documentation/data-providers-guide#oai-pmh) in the CORE Data Providers guide.
        error:
          title: OAI-PMH interface isn’t accessible.
          details: Identify and ListRecords verbs weren’t successfully verified
          info: |
            Verify that the OAI-PMH interface is actually enabled in the underlying repository software. Test if it is reachable via a standard web browser. If it is, check if IP-based controls, rate limiting, or Web Application Firewalls (WAF) are blocking machine access, and explicitely allowlist CORE's user agent or IPs.  For details check the Ensuring your repository is visible via [OAI-PMH section](/documentation/data-providers-guide#oai-pmh) in the CORE Data Providers guide. You can still apply bot traffic mitigation to the other endpoints, if you have access, you should allow machine access to your repository.

      oaiPmh_ua:
        label: OAI-PMH Interface using the CORE Headers
        success:
          title: OAI-PMH interface is accessible.
          details: Successfully verified Identify and ListRecords verbs
          info: |
            We test whether the OAI-PMH interface is actually enabled in the underlying repository software and if it is reachable via a standard web browser. We also check whether IP-based controls, rate limiting, or Web Application Firewalls (WAF) are blocking machine access, and verify that CORE's user agent or IPs are explicitly allowlisted. For details check the Ensuring your repository is visible via [OAI-PMH section](/documentation/data-providers-guide#oai-pmh) in the CORE Data Providers guide.
        error:
          title: OAI-PMH interface isn’t accessible.
          details: Identify and ListRecords verbs weren’t successfully verified
          info: |
            Verify that the OAI-PMH interface is actually enabled in the underlying repository software. Test if it is reachable via a standard web browser. If it is, check if IP-based controls, rate limiting, or Web Application Firewalls (WAF) are blocking machine access, and explicitely allowlist CORE's user agent or IPs.  For details check the Ensuring your repository is visible via [OAI-PMH section](/documentation/data-providers-guide#oai-pmh) in the CORE Data Providers guide. You can still apply bot traffic mitigation to the other endpoints, if you have access, you should allow machine access to your repository.

      blockingHeaders:
        label: Detection of Blocking Headers/Redirects
        success:
          title: No blocking engine detected.
          details: No redirects to Cloudflare or other blocking services
          info: |
            We check the settings of your hosting provider or Content Delivery Network (CDN) and check if features that indiscriminately block bots (e.g., Cloudflare's "Block AI Training Bots") or whitelist CORE in your bot mitigation service so it is not intercepted by challenge pages are disabled. For details check [Access for machine agents](/documentation/data-providers-guide#machine-agents) and [Supporting machine access](/documentation/data-providers-guide#supporting-machine-access) sections in the CORE Data Providers guide.
        error:
          title: Blocking engine detected.
          details: Redirects to Cloudflare or other blocking services found
          info: |
            Check the settings of your hosting provider or Content Delivery Network (CDN). Disable features that indiscriminately block bots (e.g., Cloudflare's "Block AI Training Bots") for your OAI-PMH endpoint or whitelist CORE in your bot mitigation service so it is not intercepted by challenge pages. For details check [Access for machine agents](/documentation/data-providers-guide#machine-agents) and [Supporting machine access](/documentation/data-providers-guide#supporting-machine-access) sections in the CORE Data Providers guide.


      blockingHeaders_ua:
        label: Detection of Blocking Headers/Redirect using the CORE Headers
        success:
          title: No blocking engine detected.
          details: No redirects to Cloudflare or other blocking services
          info: |
            We check the settings of your hosting provider or Content Delivery Network (CDN) and check if features that indiscriminately block bots (e.g., Cloudflare's "Block AI Training Bots") or whitelist CORE in your bot mitigation service so it is not intercepted by challenge pages are disabled. For details check [Access for machine agents](/documentation/data-providers-guide#machine-agents) and [Supporting machine access](/documentation/data-providers-guide#supporting-machine-access) sections in the CORE Data Providers guide.
        error:
          title: Blocking engine detected.
          details: Redirects to Cloudflare or other blocking services found
          info: |
            Check the settings of your hosting provider or Content Delivery Network (CDN). Disable features that indiscriminately block bots (e.g., Cloudflare's "Block AI Training Bots") for your OAI-PMH endpoint or whitelist CORE in your bot mitigation service so it is not intercepted by challenge pages. For details check [Access for machine agents](/documentation/data-providers-guide#machine-agents) and [Supporting machine access](/documentation/data-providers-guide#supporting-machine-access) sections in the CORE Data Providers guide.


