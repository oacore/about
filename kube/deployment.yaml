apiVersion: apps/v1
kind: Deployment
metadata:
  name: core-frontend-about
  namespace: core-frontend
  labels:
    app: core-frontend-about
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: core-frontend-about
  template:
    metadata:
      labels:
        app: core-frontend-about
    spec:
      nodeSelector:
        agentpool: userpool
      containers:
        - name: core-frontend-about
          image: ${IMAGE}
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: core-frontend-about-secrets
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          startupProbe:
            httpGet:
              path: /
              port: http
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 1500m
              memory: 1Gi