  apiVersion: autoscaling/v2
  kind: HorizontalPodAutoscaler
  metadata:
    name: core-frontend-about
    namespace: core-frontend
  spec:
    scaleTargetRef:
      apiVersion: apps/v1
      kind: Deployment
      name: core-frontend-about
    minReplicas: 2
    maxReplicas: 6
    metrics:
      - type: Resource
        resource:
          name: cpu
          target:
            type: Utilization
            averageUtilization: 70
      - type: Resource
        resource:
          name: memory
          target:
            type: Utilization
            averageUtilization: 80  
    behavior:
      scaleUp:
        stabilizationWindowSeconds: 0
        policies:
          - type: Pods
            value: 4
            periodSeconds: 15
          - type: Percent
            value: 100
            periodSeconds: 15
        selectPolicy: Max
      scaleDown:
        stabilizationWindowSeconds: 600 
        policies:
          - type: Pods
            value: 1
            periodSeconds: 180 
        selectPolicy: Max